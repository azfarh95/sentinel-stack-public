# Builds the SMDL Docker image for amd64 + arm64 and publishes to GHCR.
#
# Triggers:
#   - Push to main → publishes ghcr.io/YOUR_GITHUB_USERNAME/smdl:latest + :sha-<7chars>
#   - Tag v*       → publishes ghcr.io/YOUR_GITHUB_USERNAME/smdl:<tag> + :latest
#   - Manual       → run via workflow_dispatch
#
# Pre-reqs:
#   - Repo is YOUR_GITHUB_USERNAME/smdl (or wherever this gets carved out to)
#   - GHCR is enabled for the user/org
#   - The GITHUB_TOKEN provided by Actions has packages:write
#     (granted by default for repos in the same owner namespace)
#
# Local equivalent (Windows/Mac/Linux):
#   docker buildx create --use --name multi
#   docker buildx build --platform=linux/amd64,linux/arm64 \
#     -t ghcr.io/YOUR_GITHUB_USERNAME/smdl:dev --push .

name: build-publish

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}     # YOUR_GITHUB_USERNAME/smdl

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false  # smaller manifest, fewer "attestation" pulls confusion

      - name: Summary
        run: |
          echo "## Published" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
