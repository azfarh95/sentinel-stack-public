# Drives scripts/fund_tracker.py daily NAV refresh + /drill/funds page.
#
# Sources of NAV (in priority order, first hit wins):
#   wise         : Wise /v1/rates (FX only, not fund NAVs)
#   fsmone       : fundsupermart.com factsheet — JS-rendered, needs Playwright
#   morningstar  : sg.morningstar.com — server-rendered (preferred)
#   manual       : last manual entry, with stale-warning if >30 days
#
# Each fund holds: name, isin (optional), source URLs, last NAV + date,
# and per-policy unit holdings.

