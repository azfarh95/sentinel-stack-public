# Account Directory — single source of truth for all identifiers → CoA mappings.
#
# Authored 2026-05-14 to eliminate the scatter-bug that had `sc-creditable.yaml`
# claiming gl_account_code=2113 while the actual CoA had 2113=SC CC and the
# classifier was routing MEPS Receipts to 2113 (wrong) instead of 2213 (Maybank
# CreditAble).
#
# CONSUMED BY:
#   - app.account_router.route(tx) — single resolver used by every parser path
#   - statement schemas (informational, NOT authoritative for gl_account_code)
#   - chart_of_accounts (one-way: this directory MUST reflect what's actually
#     postable in the GL; if a code here is not postable, validation flags it)
#
# Update rule: when a new bank/card/loan is opened or closed, edit THIS file
# and ONLY this file. The classifier reloads at container start.
#
# Each entry has:
#   coa: <postable leaf code>           # required
#   name: <human label>                 # required, for narration
#   class: asset | liability | income | expense
#   identifiers:                        # any of these → this CoA
#     account_number: ...               # for savings/loans (POSB, Maybank, etc.)
#     card_number: ...                  # for CCs (16-digit; multiple formats normalised)
#     policy_number: ...                # for insurance/ILP
#     recipient_pattern: ...            # exact substring in paynow_recipient (uppercase)
#     tx_type_marker: ...               # exact tx_type match (e.g. "MEPS Receipt")
#     instalment_amount: ...            # exact amount-pinpoint (for fixed monthly bills)
#     routing_pattern: ...              # bank-specific routing line content
#
# Routing precedence (in account_router):
#   1. policy_number (most specific)
#   2. card_number / dbs_card_routing / ccc_card_routing
#   3. account_number / msl_routing / cashline_routing / sc_routing / gxs_routing
#   4. recipient_pattern
#   5. instalment_amount (only when tx_type matches expected pattern)
#   6. tx_type_marker (fallback for documents without specific identifiers)

