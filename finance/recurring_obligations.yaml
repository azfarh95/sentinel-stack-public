# Sentinel Finance — Recurring obligations registry seed
# -------------------------------------------------------
# Hand-curated list of known recurring outflows. The recurring_reconciler reads
# this YAML on startup and upserts each row into recurring_obligation_registry.
# Add a new obligation here when source-doc workflows aren't built yet (insurance
# policy parser, subscription receipt parser etc.).
#
# Fields:
#   name                : display label (unique)
#   kind                : insurance | ilp | subscription | utility | loan | tax | charity | other
#   contra_coa          : CoA leaf to debit when the outflow matches
#   expected_amount     : SGD
#   amount_tolerance    : SGD ± deviation allowed before drift_alert
#   frequency           : monthly | yearly | weekly | adhoc
#   expected_day_of_month : 1-31 (for monthly), NULL otherwise
#   grace_days          : tx may land within ± grace days of expected_day
#   identifier_patterns : list of substring/regex (case-insensitive) — match against
#                         narration or tx_type
#   counterparty_hint   : display name
#   journal_kind        : expense | transfer | loan_pay | ilp_premium
#   notes               : free text

obligations:
