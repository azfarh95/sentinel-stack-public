# Sentinel Finance — Liabilities Registry
#
# Single source of truth for every credit-facility installment plan and revolving
# credit minimum payment. Used by:
#
#   • cashflow_digest.py        → projects C (next month) + D (subsequent months)
#   • sync_registry_to_bills.py → one Firefly Bill per account, amount = sum of
#                                 active plan monthlies; auto-extends end date
#                                 to longest-running plan
#   • parse_installment_plans.py (Phase 1, weekend build) → ingests statement
#                                 PDFs monthly and updates this file in place
#
# Bootstrap source: Apr'26 statements + user's master spreadsheet (12 May 2026).
# Subsequent updates should be driven by Phase-1 parser; manual edits are fine
# but flag with `source: manual` so the parser doesn't clobber them.

