# Sentinel Finance — Bank & Product Universe (Singapore retail banking)
#
# THIS FILE: defines what banks and product lines exist in the market.
# Sentinel may or may not have a parser for any given product — that mapping
# lives in parser_registry.yaml.
#
# Coverage flow:
#   bank_product_registry  defines  {bank → products[]}     ← what exists
#   parser_registry        defines  parser handles (bank, product) ← what we parse
#   bot can answer:
#     - "What banks does Sentinel know about?" → enumerate banks here
#     - "Does Sentinel parse OCBC credit cards?" → join parser_registry on (ocbc, cc)
#     - "What DBS products are unsupported?" → diff dbs.products vs parser_registry.handles
#
# Schema per bank:
#   slug         : stable lowercase ID (used as FK in parser_registry.handles.bank)
#   display_name : marketing name
#   legal_name   : registered entity name (for matching statement headers)
#   country      : ISO-3166 alpha-2 (SG, MY, US, etc.)
#   regulator    : MAS | SEC | etc.
#   products     : list of product lines
#
# Schema per product:
#   slug                : stable ID (used in parser_registry.handles.product)
#   display             : marketing name
#   type                : deposit | credit_card | line_of_credit | term_loan |
#                         hire_purchase | mortgage | investment_link | securities |
#                         insurance | brokerage | digital_wallet
#   statement_formats   : [pdf, csv, ofx, xls, jpg, ...]
#   account_number_re   : regex for the account-number format (helps classifier disambiguate)
#   notes               : product-specific quirks

