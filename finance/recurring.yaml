# Sentinel Finance — Recurring Schedule
#
# Single source of truth for Cash Forecast projection. Drives /cash_forecast page.
# Income entries land in POSB on `day`. Expenses leave POSB on `day`.
#
# Edit via Mini App: /cash_forecast → "+ Add recurring" button. The form
# appends to this file. You can also hand-edit + restart portfolio-mcp.

income:
  - name: "AZ United (main monthly salary)"
    amount: 2649.00
    day: 29              # day of month
    source: "POSB"
    enabled: true
    note: "Main monthly payroll credit from AZ United Pte Ltd"

  - name: "YourAgency Security (weekly)"
    amount: 360.00
    day: 7
    source: "POSB"
    enabled: false       # disabled 2026-05-13: superseded by calendar-driven scan (Primary + Bills + Deployments)
    note: "Now driven by Google Calendar events in 'Deployments' calendar. See cash_forecast._youragency_deployments_in_range."

expense:
