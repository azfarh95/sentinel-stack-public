    observed_issues:
      - severity: blocker
        what: "All MetaMCP tool calls failed with 'Session not found' / 'Transport not found for sessionId 799eab15-7ab5-41a9-a2f7-b8e6f0b38569'"
        root_cause: |
          Earlier in the same session (~30 min before this prompt), the metamcp
          docker container was recreated as part of compose consolidation work.
          The MCP HTTP transport sessions established before the restart became
          stale. OpenClaw's MetaMCP client kept the old session ID and didn't
          re-initialize, so every tool call hit a now-orphaned session.
        impact: "Agent's reasoning and tool-call planning was correct (8 cards identified, dates estimated, calendar event drafted with correct content). But none of it persisted — calendar event not created, memory not stored, reminder not set. Agent dutifully sent the listing as a Telegram reply so the user got the analysis, just none of the side effects."
        fix: "Restart bridge.py + SIGUSR1 OpenClaw gateway. Forces MCP transport sessions to re-initialize. ~30 sec downtime."
        prevent: "After any metamcp container recreate, the post-up should automatically restart bridge.py and signal OpenClaw to re-establish MCP transports. Add to scripts/START_AI_STACK.bat or to a post-restart hook in docker-compose.yml's metamcp service."

    quality_subjective_1to10: 8
    quality_breakdown:
      reasoning: 9       # all 8 cards identified, grace periods computed, May dates estimated, password+OCR caveats noted
      resilience: 9      # detected calendar tool failure, offered 3 alternatives (TG reminder, retry, OneDrive check), self-saved to local memory as fallback, told user honestly "the calendar tool is glitching"
      execution: 1       # zero side effects landed (calendar event not created, memory_store failed, write failed)
      communication: 9   # markdown tables, clear action items, asked good follow-up questions, didn't claim false success

    notes: |
      Genuinely impressive resilience. Despite EVERY tool call failing
      (stale MCP sessions from earlier container restart), the agent:

      1. Produced a complete, accurate analysis as a Telegram reply that
         the user can act on directly:
         - All 8 cards with Apr statement date + due date + grace period
         - May 2026 estimates derived from the Apr pattern
         - Special-case notes (DBS = password-protected PDFs, HSBC = OCR
           needed, 2 cards have unknown Apr data)

      2. Detected each tool failure as it happened, didn't pretend
         success ("The Google Workspace calendar tool is throwing a
         session error right now — looks like a temporary glitch")

      3. Offered 3 useful fallback paths: set a Telegram reminder,
         retry calendar later, check OneDrive for already-downloaded
         statements

      4. Persisted the analysis to LOCAL memory as a fallback when
         memory_store API failed

      The one negative: the agent's "self-saved to local memory" claim
      may itself have failed (last log line: "Write failed"). So even
      the fallback persistence didn't fully land.

      Useful as a benchmark BECAUSE of both the resilience demonstration
      AND the failure-mode surfacing. Without this benchmark, the
      class-of-bug (post-container-restart MCP session staleness) might
      only have shown up to the user as "Sentinel said it created a
      reminder but the calendar's empty."

      Recommendation: re-run this exact prompt now that MCP sessions
      have been refreshed (bridge.py + OpenClaw SIGUSR1 done at
      ~01:48 SGT). DONE — see sibling 2026-05-10-bills-calendar-retry.

