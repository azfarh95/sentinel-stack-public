      resilience: 10       # NA (no failures in retry; first attempt's resilience was real)
      execution: 7         # tool call landed, but with wrong-day timing + wrong-dates description
      communication: 6     # output looked structured + confident, but the confidence was misleading

    ground_truth_comparison:
      method: "Read each Apr'26 PDF in C:\\Users\\azfar\\OneDrive\\CC_Statement\\Apr'26 via pypdf, extracted statement dates"
      script: "scripts/extract_statement_dates.py"
      findings:
        - card: Maybank CA
          sentinel_claimed: "29 Apr"
          actual_pdf:       "15 APR 2026 (Due: 05 May)"
          drift_days: 14
        - card: SC Simply Cash CC
          sentinel_claimed: "25 Apr"
          actual_pdf:       "16 Apr 2026 (Due: 10 May)"
          drift_days: 9
        - card: Maybank Platinum Visa
          sentinel_claimed: "25 Apr"
          actual_pdf:       "23 APR 2026 (Due: 15/05/2026)"
          drift_days: 2
        - card: UOB CashPlus
          sentinel_claimed: "29 Apr"
          actual_pdf:       "due date 04 MAY 2026 (statement date not in text)"
          drift_days: "~16 (inferred from due-date)"
        - card: DBS Cashline
          sentinel_claimed: "~20 Apr (estimate, noted)"
          actual_pdf:       "encrypted — could not verify"
          drift_days: null
        - card: DBS CC
          sentinel_claimed: "~30 Apr (estimate, noted)"
          actual_pdf:       "encrypted — could not verify"
          drift_days: null
        - card: HSBC CC
          sentinel_claimed: "Unknown (honestly stated)"
          actual_pdf:       "image-only PDF, no extractable text — Sentinel's 'unknown' was correct"
          drift_days: 0      # honest admission

    root_cause_analysis: |
      Sentinel did NOT read the PDFs. The trajectory shows zero
      onedrive_read or document-extract tool calls. Dates came from
      memory_search results — likely pulling old or imagined patterns
      from prior conversations, not current ground truth.

      Compounding error: because Apr statement dates are 9-14 days
      earlier than claimed, the May estimates are off by the same
      amount. The Bills calendar event:
        - is dated for today (2026-05-10) — wrong day for the reminder
        - description says "est. out 25-30 May" — actually ~15-23 May
        - May actually be DROPPING NOW, while reminder fires today

      The agent's reasoning chain LOOKED plausible (grace-period math,
      structured tables, citation of source pattern) but every premise
      was incorrect. Pattern-matching its own prior memory entries
      instead of verifying against source documents.

    benchmark_lesson: |
      Confident-but-wrong is the dangerous failure mode for personal AI
      assistants. A user who trusts the agent's clean Markdown table will
      miss their statement window and could miss a payment.

      The fix is NOT smarter reasoning — it's source-document
      verification. Sentinel should:
        1. Search OneDrive/CC_Statement for the most recent statement
           folder (Apr'26 in this case)
        2. Read each PDF it can (pypdf or onedrive_read with extraction)
        3. For encrypted/image PDFs, surface the limitation explicitly
        4. Present dates as "verified from PDF" vs "estimated from
           pattern" with different confidence markers

    follow_up_correction:
      sent_at: "2026-05-10T02:27:50+08:00"
      task: "User flagged the wrong dates + applied new TOOLS.md rule (Source-of-Truth Discipline) before sending"
      result: |
        Agent response (turn 9): demonstrably applied the new rule.
        - Made 4 onedrive_read calls + 3 exec calls trying to verify against PDFs
        - Onedrive MCP threw aiohttp parse errors; agent fell back to user-provided ground-truth dates
        - Acknowledged the failure mode explicitly: "I pattern-matched
          from memory instead of reading the actual source documents"
        - Updated calendar event start date from 10 May → 13 May
        - Stored memory ID 45: "NEVER estimate statement dates from memory..."

        Initially appeared to skip the calendar/memory tool calls — turned
        out to be a parser bug in my analysis script (snap[64] had an
        unrecognized role format). Verification turn 10 confirmed both
        actions actually completed and showed via calendar_get + memory_search
        that the side effects landed.

      verify_turn_quality: |
        Turn 10 (verification challenge — "you claimed you did X, prove it"):
        - Ran calendar_get + memory_search to verify
        - Showed actual tool results in reply
        - Self-critique: "I announced success without showing the tool
          results... that's the exact announce-then-skip pattern the
          Self-Correction Discipline rule warns against. Lesson learned:
          always show tool results or explicitly verify before claiming
          success."
        Quality: 10/10 — meta-learning behavior, exemplary

      outcome:
        calendar_event_final_state:
          id: o3e77gl3v81rp0s9a8dtok6748
          summary: "📄 Download May 2026 CC Statements → OneDrive (Corrected Dates)"
          start: "2026-05-13"
          end: "2026-05-16"
          color_id: 10
        memory_id_45:
          content_preview: "NEVER estimate statement dates from memory. Memory-based estimates for Apr'26 CC statement dates were off by 9-14 days..."
          tags: ["incident", "finance", "lesson"]

    notes: |
      Originally rated 10/10 because the calendar event creation
      succeeded end-to-end and the agent demonstrated context-aware
      retry. After ground-truth verification against the actual PDFs,
      downgraded to 5/10. Side-effect-execution was clean, but the
      *content* of the side effect was wrong — wrong day, wrong dates.

      Demonstrates **context-aware retry** — a meaningful agent capability.
      After the failed run produced complete reasoning but failed side
      effects, the retry recognized "the analysis is done in conversation
      history, only the calendar event needs creating" and executed
      exactly that. Single tool call, single success, full task completion.

      Cost comparison:
        Failed attempt: 376K input  (~SGD 1.60 cloud-equivalent)
        Retry:          114K input  (~SGD 0.37 cloud-equivalent)
        Combined:       490K input  (~SGD 2.00)
        vs naive 2x:    752K input  (~SGD 3.20) — saved ~40%

      Side effect verified live: Google Calendar event ID
      o3e77gl3v81rp0s9a8dtok6748 created in the Bills calendar with the
      full 8-card statement schedule.

  - id: 2026-05-10-bank-email-audit-3pass
    task: "Phase 0 bank email audit — categorize each bank's senders as STATEMENT vs MARKETING, identify ATTACH vs LINK delivery"
    description: |
      Three iterations of the same task, each pass fixing a distinct
      prompt-design failure surfaced by user feedback. Tests the agent's
      ability to learn from corrections within a conversation.
    agent: sentinel-local
    model: qwen/qwen3.6-27b
    quantization: Q4_K_M
    context_loaded: 131072
    parent: null
    sibling_run: null

    trajectory: \\wsl.localhost\Ubuntu-24.04\home\azfar\.openclaw\agents\main\sessions\e806f43b-f2e2-4b83-8642-4f80a89c3f36.trajectory.jsonl
    turn_range: [11, 13]   # three turns: pass 1, pass 2, pass 3
    start_local: "2026-05-10T03:34:36+08:00"
    end_local:   "2026-05-10T04:08:00+08:00"   # approximate
    wall_clock_minutes: ~33
    model_invocations: 3

    iterations:
      pass_1:
        prompt_strategy: "Domain-restricted (.com.sg only)"
        wall_clock: 6.4 min
        result: "Found 3 banks with statements; missed Maybank entirely (uses .com not .com.sg)"
        failure_mode: "Domain assumption — banks use multiple TLDs"

      pass_2:
        prompt_strategy: "Broad name-based search (per bank: 'DBS' OR 'POSB', 'Maybank', etc.)"
        wall_clock: 11.2 min
        result: "Found 4 banks with statements; classified HSBC as MARKETING-only"
        failure_mode: "Top-K classification — high-volume marketing senders drown out statements"
        user_feedback: "I have HSBC statements in this email"

      pass_3:
        prompt_strategy: "Subject-targeted filter (subject:statement / subject:eStatement)"
        wall_clock: ~10 min
        result: "Found HSBC statements at ebanking@mail.hsbc.com.sg with ATTACH delivery"
        new_insight: "HSBC is the ONLY ATTACH bank — fully Phase-1-automatable. Self-correction log added by agent documenting the lesson."

    quality_subjective_1to10: 9
    quality_breakdown:
      iterative_learning: 10  # each pass demonstrably better than prior
      source_of_truth: 9      # actually read emails (per the new TOOLS.md rule); didn't pattern-match
      self_documentation: 10  # agent wrote a "Self-Correction Log" section unprompted
      thoroughness: 8         # missed UOB/GXS until specifically prompted to verify
      communication: 9        # clear tables, classification rationale, confidence markers

    notes: |
      Demonstrates a meaningful capability: the agent learns from user
      corrections within a single conversation. Each iteration:
        - Pass 1 → Pass 2: user identified prompt narrowness; agent
          adopted broader name-based search
        - Pass 2 → Pass 3: user provided ground truth ("HSBC statements
          DO exist"); agent re-searched with targeted subject filter
          AND wrote a self-correction log explaining the failure mode

      The agent's pass-3 self-correction log is exemplary:
        "High-volume marketing senders require subject-specific filters
         (subject:statement, subject:eStatement) to surface statement
         emails. Never classify a bank as marketing-only without first
         trying statement-specific subject filters."

      Generalizable lesson for future research-style prompts:
        1. Don't constrain by domain — use bank name + acronym
        2. For high-noise senders, use subject-targeted filters
        3. After negative result, verify with explicit subject filter
           before concluding the bank is genuinely absent

      Outcome: HSBC identified as the FIRST automatable bank for Phase 1
      (Gmail watcher → PDF attachment → OneDrive). Other banks (DBS,
      Maybank, SC) confirmed as LINK delivery requiring portal access.
      UOB/GXS/Hong Leong absent from this email account → require
      Gmail forwarding from secondary account or per-bank email update.

