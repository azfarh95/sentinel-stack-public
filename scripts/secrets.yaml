# Sentinel — Secrets-to-Consumers Map
#
# Single source of truth for "which long-running services need to be
# restarted (or notified) when a given secret rotates."
#
# Used by scripts/restart_consumers.ps1: given a logical secret name, it
# looks up the consumers list here and bounces each one in order.
#
# Add new secrets / new consumers HERE, then update the relevant
# rotate_*.ps1 to call:
#     & ./restart_consumers.ps1 -Secret <name>
# instead of hard-coding restart blocks.
#
# Convention:
#   - The secret name is the LOGICAL identifier (not a WCM key name).
#   - `wcm:` lists every WCM namespace/key pair that holds this secret.
#     The first entry is canonical; later entries are mirrors that must
#     be kept in sync.
#   - `files:` lists on-disk consumers OTHER than WCM. Each entry has
#     `path` (where the secret is embedded) and `jq_path` (JSON path for
#     surgical update; null = whole-file).
#   - `consumers:` lists processes/containers that read this secret at
#     startup and need to be restarted to pick up rotations. Each entry
#     has `kind` (one of: docker, wsl-systemd, win-pythonw, win-service,
#     scheduled-task) + `name` (the docker container name, systemd unit
#     name, process command-line regex, etc).
#
# Notes on `re-read-per-probe` services: those have a hot-reload field
# set to true; restart helper logs them as "skipped (hot-reload)".

secrets:
  lm_studio_api_key:
    description: "LM Studio Local Server API key — used by OpenClaw → LM Studio + watchdog probe + infer-bridge"
    wcm:
      - {service: sentinel-openclaw, key: lmstudio_api_key}      # canonical
      - {service: sentinel-watchdog, key: lm_api_key}            # mirror
    files:
      - {path: "wsl:/home/azfar/.openclaw/agents/main/agent/auth-profiles.json", jq_path: "profiles.lmstudio:default.key"}
      - {path: "wsl:/home/azfar/.openclaw/openclaw.json",                        jq_path: "*.apiKey ~ /^sk-lm-/"}
      - {path: "wsl:/home/azfar/.openclaw/agents/main/agent/models.json",        jq_path: "*.apiKey ~ /^sk-lm-/"}
    consumers:
      - {kind: wsl-systemd,    name: openclaw-gateway}
      - {kind: win-pythonw,    name: "infer_bridge\\.py",  hot-reload: false}
      - {kind: win-pythonw,    name: "watchdog\\\\watchdog\\.py", hot-reload: true}   # Phase B done — per-probe read

  tavily_api_key:
    description: "Tavily search API key — MCP server + OpenClaw native web_search"
    wcm:
      - {service: sentinel-miniapp, key: tavily_api_key}
    files:
      - {path: "pg:metamcp-pg/metamcp_db/mcp_servers.env.TAVILY_API_KEY", jq_path: null}
      - {path: "wsl:/home/azfar/.openclaw/openclaw.json",                  jq_path: "*.apiKey ~ /^tvly-/"}
    consumers:
      - {kind: docker,      name: metamcp}
      - {kind: wsl-systemd, name: openclaw-gateway}

  smdl_bot_token:
    description: "Standalone Sentinel Media Downloader bot — Telegram bot polling"
    wcm:
      - {service: sentinel-miniapp, key: smdl_bot_token}
    files: []
    consumers:
      - {kind: docker, name: smdl}

  telegram_bot_token:
    description: "Agent bot @YourSentinelBot — used by OpenClaw gateway as primary channel"
    wcm:
      - {service: sentinel-miniapp, key: telegram_bot_token}
    files:
      - {path: "wsl:/home/azfar/.openclaw/openclaw.json", jq_path: "channels.telegram.botToken"}
    consumers:
      - {kind: wsl-systemd, name: openclaw-gateway}

  watchdog_bot_token:
    description: "Watchdog bot @YourWatchdogBot — status + alerts"
    wcm:
      - {service: sentinel-watchdog, key: bot_token}
    files: []
    consumers:
      - {kind: win-pythonw, name: "watchdog\\\\watchdog\\.py"}

  github_pat:
    description: "GitHub Personal Access Token — github-mcp + watchdog repo-state probes"
    wcm:
      - {service: sentinel-miniapp, key: github_pat}
    files: []
    consumers:
      - {kind: docker,      name: github-mcp}
      - {kind: win-pythonw, name: "watchdog\\\\watchdog\\.py", hot-reload: true}   # if Phase B extends

  docintel_key:
    description: "Azure Document Intelligence key — onedrive-mcp PDF parsing"
    wcm:
      - {service: sentinel-miniapp, key: docintel_key}
    files: []
    consumers:
      - {kind: docker, name: onedrive-mcp}

  onedrive_client_secret:
    description: "OneDrive Azure App Registration client secret"
    wcm:
      - {service: sentinel-miniapp, key: onedrive_client_secret}
    files: []
    consumers:
      - {kind: docker, name: onedrive-mcp}

  better_auth_secret:
    description: "MetaMCP session-encryption secret"
    wcm:
      - {service: sentinel-miniapp, key: better_auth_secret}
    files: []
    consumers:
      - {kind: docker, name: metamcp}

  totp_secret:
    description: "TOTP shared seed for sentinel-miniapp-v2 auth gate"
    wcm:
      - {service: sentinel-miniapp, key: totp_secret}
    files: []
    consumers:
      - {kind: win-pythonw, name: "sentinel-miniapp-v2[\\\\/]bridge\\.py"}

  telethon_session:
    description: "Telethon user-account session for >50 MB uploads in smdl"
    wcm:
      - {service: sentinel-miniapp, key: telethon_session}
    files: []
    consumers:
      - {kind: docker, name: smdl}

  google_oauth_client_secret:
    description: "Google Workspace OAuth client_secret (Web flow)"
    wcm:
      - {service: sentinel-miniapp, key: google_oauth_client_secret}
    files:
      - {path: "win:C:\\Users\\azfar\\metamcp-local\\google-workspace-mcp\\data\\credentials.json", jq_path: "web.client_secret"}
      - {path: "win:C:\\Users\\azfar\\metamcp-local\\google-workspace-mcp\\data\\token.json",        jq_path: "client_secret"}
    consumers:
      - {kind: docker, name: google-workspace-mcp}

  cloudflared_token:
    description: "Cloudflare Tunnel connector token (account=3b9fa0bc..., tunnel=9a2bb3c8...)"
    wcm:
      - {service: sentinel-miniapp, key: cloudflared_token}
    files:
      - {path: "win-service:cloudflared.binPath", jq_path: null}
    consumers:
      - {kind: win-service, name: cloudflared}

  vaultwarden_admin_token:
    description: "Vaultwarden /admin login (argon2id hash form)"
    wcm:
      - {service: sentinel-miniapp, key: vaultwarden_admin_token}
    files: []
    consumers:
      - {kind: docker, name: vaultwarden}

  owner_auth_token:
    description: "Sentinel Suite cookie-auth shim HMAC token (.your-domain.example.com, 90-day TTL)"
    wcm:
      - {service: sentinel-miniapp, key: owner_auth_token}
    files: []
    consumers:
      - {kind: docker, name: sentinel-vpn-dashboard}
      - {kind: win-pythonw, name: "sentinel-miniapp-v2[\\\\/]bridge\\.py"}
